<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SneakerGuy - Buscador</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0D0D0D;
      color: #fff;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      color: #00FF85;
    }

    /* Button */
    .btn {
      background: #00FF85;
      color: #000;
      border: none;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }

    .btn:hover {
      background: #00cc6a;
    }

    .btn:focus {
      outline: 3px solid #00FF85;
      outline-offset: 2px;
    }

    .message {
      margin-top: 1rem;
      padding: 1rem;
      background: #1a1a1a;
      border-radius: 8px;
      display: none;
    }

    .message.show {
      display: block;
    }

    /* Search */
    .search-section {
      margin-top: 2rem;
    }

    .search-input {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: 2px solid #333;
      border-radius: 8px;
      background: #1a1a1a;
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus {
      border-color: #00FF85;
    }

    .search-input::placeholder {
      color: #666;
    }

    /* Results list */
    .results-list {
      margin-top: 0.5rem;
      list-style: none;
      max-height: 200px;
      overflow-y: auto;
    }

    .result-item {
      padding: 0.75rem 1rem;
      background: #1a1a1a;
      margin-bottom: 0.25rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .result-item:hover {
      background: #2a2a2a;
    }

    .result-item:focus {
      outline: 2px solid #00FF85;
      outline-offset: -2px;
    }

    /* Selected result */
    .selected-result {
      margin-top: 1.5rem;
      padding: 1.5rem;
      background: linear-gradient(135deg, #00FF85 0%, #00cc6a 100%);
      border-radius: 12px;
      color: #000;
      display: none;
    }

    .selected-result.show {
      display: block;
    }

    .selected-result h2 {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
    }

    .selected-result p {
      font-size: 0.875rem;
      opacity: 0.8;
    }

    /* Responsive */
    @media (max-width: 480px) {
      body {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>SneakerGuy</h1>

    <!-- Botón 1 a 1 -->
    <button 
      class="btn" 
      id="btn-1a1"
      aria-label="Mostrar mensaje 1 a 1"
      aria-expanded="false"
    >
      1 a 1
    </button>

    <!-- Mensaje -->
    <div 
      class="message" 
      id="message"
      role="alert"
      aria-live="polite"
    >
      <strong>¡Mensaje 1 a 1:</strong> Has hecho clic en el botón secreto. ¡Bienvenido a SneakerGuy!
    </div>

    <!-- Búsqueda -->
    <div class="search-section">
      <label for="search" class="sr-only">Buscar sneakers</label>
      <input
        type="search"
        id="search"
        class="search-input"
        placeholder="Buscar sneakers..."
        aria-label="Buscar sneakers"
        aria-controls="results-list"
        autocomplete="off"
      >

      <ul 
        id="results-list" 
        class="results-list" 
        role="listbox"
        aria-label="Resultados de búsqueda"
      ></ul>
    </div>

    <!-- Resultado seleccionado -->
    <div 
      id="selected-result" 
      class="selected-result"
      role="article"
      aria-label="Resultado seleccionado"
    >
      <h2>the sneekr guy</h2>
      <p>¡Has seleccionado este resultado! 🎉</p>
    </div>
  </div>

  <script>
    // Datos mock
    const mockResults = [
      { id: 1, name: 'Air Jordan 1 - Chicago', brand: 'Jordan', price: 18500 },
      { id: 2, name: 'Nike Dunk Low Panda', brand: 'Nike', price: 4200 },
      { id: 3, name: 'New Balance 550', brand: 'New Balance', price: 3500 },
      { id: 4, name: 'Yeezy Boost 350', brand: 'Adidas', price: 6500 },
      { id: 5, name: 'Air Force 1 Low', brand: 'Nike', price: 2800 },
      { id: 6, name: 'the sneekr guy', brand: 'SneakerGuy', price: 9999 },
    ];

    // Elementos
    const btn1a1 = document.getElementById('btn-1a1');
    const message = document.getElementById('message');
    const searchInput = document.getElementById('search');
    const resultsList = document.getElementById('results-list');
    const selectedResult = document.getElementById('selected-result');

    // Botón 1 a 1
    btn1a1.addEventListener('click', () => {
      message.classList.toggle('show');
      const isShown = message.classList.contains('show');
      btn1a1.setAttribute('aria-expanded', isShown);
    });

    // Búsqueda
    searchInput.addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase().trim();
      
      if (query.length === 0) {
        resultsList.innerHTML = '';
        return;
      }

      const filtered = mockResults.filter(item => 
        item.name.toLowerCase().includes(query) ||
        item.brand.toLowerCase().includes(query)
      );

      renderResults(filtered);
    });

    function renderResults(items) {
      resultsList.innerHTML = '';
      
      if (items.length === 0) {
        resultsList.innerHTML = '<li class="result-item" role="option">Sin resultados</li>';
        return;
      }

      items.forEach((item, index) => {
        const li = document.createElement('li');
        li.className = 'result-item';
        li.setAttribute('role', 'option');
        li.setAttribute('tabindex', '0');
        li.textContent = `${item.name} - $${item.price}`;
        
        li.addEventListener('click', () => selectResult(item));
        li.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            selectResult(item);
          }
        });

        resultsList.appendChild(li);
      });
    }

    function selectResult(item) {
      const title = selectedResult.querySelector('h2');
      const desc = selectedResult.querySelector('p');
      
      title.textContent = item.name;
      desc.textContent = `${item.brand} - $${item.price} (The Sneekr Guy Selection)`;
      selectedResult.classList.add('show');
    }
  </script>
</body>
</html>
